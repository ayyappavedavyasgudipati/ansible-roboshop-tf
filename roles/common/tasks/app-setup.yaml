- name: Add the system user roboshop
  ansible.builtin.user:
    name: roboshop
    system: true
    home: /app
    shell: /sbin/nologin
    comment: "Roboshop system user"

- name: deleting app directory
  ansible.builtin.file:
    path: /app
    state: absent     

- name: Create app directory if it does not exist
  ansible.builtin.file:
    path: /app
    state: directory

- name: deleting {{ component }}.zip
  ansible.builtin.file:
    path: /tmp/{{ component }}.zip
    state: absent     

- name: Download {{ component }}
  ansible.builtin.get_url:
    url: https://roboshop-artifacts.s3.amazonaws.com/{{ component }}-v3.zip 
    dest: /tmp/{{ component }}.zip  

- name: Extract {{ component }}.zip
  ansible.builtin.unarchive:
    src: /tmp/{{ component }}.zip
    dest: /app   
    remote_src: yes